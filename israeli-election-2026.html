<style>

.nav-link { font-size: 13px; font-weight: 600; color: #555; text-decoration: none; }
.nav-link:hover { color: #185FA5; }
.nav-link.active { color: #185FA5; }

/* ── DATE BAR ── */
.date-bar { padding: 12px 24px; font-size: 12px; color: #999; border-bottom: 1px solid #eee; background: #fff; text-align: center; }

/* ── HERO ── */
.hero-message { text-align: center; padding: 28px 24px 20px; max-width: 780px; margin: 0 auto; }
.hero-h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; line-height: 1.3; }

/* ── PAGE LAYOUT ── */
.page-layout { max-width: 900px; margin: 0 auto; padding: 20px 20px 60px; }

/* ── FEED COLUMN ── */
.feed-col { min-width: 0; }
.feed-col-label { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.feed-col-label-text { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #8A8878; white-space: nowrap; }
.feed-col-label-line { flex: 1; height: 1px; background: #E4E2D8; }

/* ── NEWS CARDS ── */
.story-card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; margin-bottom: 14px; overflow: hidden; text-decoration: none; color: inherit; display: block; transition: box-shadow 0.15s, border-color 0.15s; }
.story-card:hover { border-color: #ccc; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.card-image { width: 100%; height: 190px; object-fit: cover; display: block; background: #ddd; }
.card-body { padding: 14px 16px 12px; }
.card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.card-tag { font-size: 11px; font-weight: 700; color: #185FA5; letter-spacing: 0.4px; text-transform: uppercase; }
.card-dot { width: 3px; height: 3px; border-radius: 50%; background: #ccc; display: inline-block; }
.card-time { font-size: 11px; color: #aaa; }
.card-title { font-size: 17px; font-weight: 700; line-height: 1.4; color: #1a1a1a; margin-bottom: 8px; }
.card-summary { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 12px; padding: 10px 12px; background: #f7f7f5; border-radius: 6px; border-right: 3px solid #185FA5; }
.single-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #E65100; background: #FFF3E0; padding: 3px 8px; border-radius: 20px; font-weight: 600; margin-bottom: 10px; }
.card-footer { display: flex; align-items: center; gap: 12px; }
.bias-wrap { flex: 1; }
.bias-bar { height: 4px; border-radius: 2px; overflow: hidden; display: flex; margin-bottom: 3px; }
.bar-l { background: #C94B7B; }
.bar-c { background: #ccc; }
.bar-r { background: #185FA5; }
.bias-labels { display: flex; justify-content: space-between; font-size: 10px; }
.bias-labels .l { color: #C94B7B; }
.bias-labels .c { color: #bbb; }
.bias-labels .r { color: #185FA5; }
.source-pills { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.source-pill { width: 24px; height: 24px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; }
.source-count { font-size: 11px; color: #aaa; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 60px 24px; color: #999; }
.empty-state-title { font-size: 16px; font-weight: 700; color: #555; margin-bottom: 8px; }
.empty-state-text { font-size: 13px; line-height: 1.6; }

<body>

<nav>
  <a class="nav-logo" href="home.html">פוזי<span>ציה</span></a>
  <div class="nav-links">
    <a class="nav-link" href="home.html">חדשות</a>
    <a class="nav-link active" href="elections-2026.html">בחירות 2026</a>
  </div>
</nav>

<div class="date-bar" id="date-bar"></div>

<div class="hero-message">
  <h1 class="hero-h1">בחירות 2026</h1>
  <p class="hero-sub">כל הכתבות והניתוחים על מערכת הבחירות — מכל הזוויות, מסוכם בבירור כדי שתוכלו להבין מהר מה באמת קורה.</p>
</div>

<div class="page-layout">
  <div class="feed-col">
    <div class="feed-col-label">
      <span class="feed-col-label-text">כל הכתבות</span>
      <div class="feed-col-label-line"></div>
    </div>
    <div id="feed"></div>
  </div>
</div>

<script>
// ── DATE BAR ──
(function() {
  var days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  var months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  var now = new Date();
  document.getElementById('date-bar').textContent =
    'יום ' + days[now.getDay()] + ', ' + now.getDate() + ' ב' + months[now.getMonth()] + ' ' + now.getFullYear();
})();

// ── TIME AGO ──
function timeAgo(dateStr) {
  if (!dateStr) return '';
  var diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
  if (diff < 60) return 'עכשיו';
  if (diff < 3600) return 'לפני ' + Math.floor(diff / 60) + ' דקות';
  if (diff < 86400) return 'לפני ' + Math.floor(diff / 3600) + ' שעות';
  if (diff < 172800) return 'אתמול';
  var d = new Date(dateStr);
  return d.getDate() + '.' + (d.getMonth() + 1) + '.' + d.getFullYear();
}

// ── FEED ──
fetch('/api/elections-2026-stories')
  .then(r => r.json())
  .then(stories => {
    var feed = document.getElementById('feed');

    if (!stories.length) {
      feed.innerHTML = '<div class="empty-state">' +
        '<div class="empty-state-title">עדיין אין כתבות בקטגוריה זו</div>' +
        '<div class="empty-state-text">כתבות על בחירות 2026 יופיעו כאן ברגע שיפורסמו.</div>' +
        '</div>';
      return;
    }

    stories.forEach(function(s) {
      var pills = s.sources.map(function(src) {
        return '<div class="source-pill" style="background:' + src.color + ';">' + src.label + '</div>';
      }).join('');

      var singleBadge = s.single_source
        ? '<div class="single-badge">⚠ מקור אחד בלבד — ' + s.single_source + '</div>'
        : '';

      var timeDisplay = s.date ? timeAgo(s.date) : (s.time || '');

      var biasLabels = '';
      if (s.bias_l > 0) biasLabels += '<span class="l">שמאל ' + s.bias_l + '%</span>';
      else biasLabels += '<span></span>';
      if (s.bias_c > 0) biasLabels += '<span class="c">מרכז ' + s.bias_c + '%</span>';
      else biasLabels += '<span></span>';
      if (s.bias_r > 0) biasLabels += '<span class="r">ימין ' + s.bias_r + '%</span>';
      else biasLabels += '<span></span>';

      feed.innerHTML += '<a class="story-card" href="' + s.link + '">' +
        '<img class="card-image" src="' + s.image + '" alt="' + s.title + '" onerror="this.style.background=\'#555\'">' +
        '<div class="card-body">' +
          '<div class="card-meta">' +
            '<span class="card-tag">' + s.tag + '</span>' +
            '<span class="card-dot"></span>' +
            '<span class="card-time">' + timeDisplay + '</span>' +
          '</div>' +
          '<div class="card-title">' + s.title + '</div>' +
          '<div class="card-summary">' + s.summary + '</div>' +
          singleBadge +
          '<div class="card-footer">' +
            '<div class="bias-wrap">' +
              '<div class="bias-bar">' +
                '<div class="bar-l" style="width:' + s.bias_l + '%;"></div>' +
                '<div class="bar-c" style="width:' + s.bias_c + '%;"></div>' +
                '<div class="bar-r" style="width:' + s.bias_r + '%;"></div>' +
              '</div>' +
              '<div class="bias-labels">' + biasLabels + '</div>' +
            '</div>' +
            '<div class="source-pills">' + pills +
              '<span class="source-count">' + s.sources.length + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</a>';
    });
  });
</script>

</body>
